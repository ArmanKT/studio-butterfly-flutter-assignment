name: flutter_assignment
description: "A rebuild of the Formwork SMS Console Flutter take-home assignment."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

# ----------------------------------------------------
# Production Dependencies
# ----------------------------------------------------
dependencies:
  flutter:
    sdk: flutter
  
  # Icons & Styling
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Networking & HTTP client
  http: ^1.1.0

  # Localization & Formatting (Money dates, etc.)
  intl: ^0.19.0

  # Utilities (ID generation for mock client)
  uuid: ^4.3.3

# ----------------------------------------------------
# Development & Testing Dependencies
# ----------------------------------------------------
dev_dependencies:
  flutter_test:
    sdk: flutter

  # Mocking framework for unit and widget testing
  mocktail: ^1.0.4

  # Code quality & static analysis linter rules
  flutter_lints: ^3.0.0

# ----------------------------------------------------
# Flutter Engine Configuration
# ----------------------------------------------------
flutter:
  uses-material-design: true
