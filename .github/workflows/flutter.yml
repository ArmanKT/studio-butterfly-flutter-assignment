name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd flutter-assignment
          flutter pub get

      - name: Lint Analysis
        run: |
          cd flutter-assignment
          flutter analyze

      - name: Run Unit & Widget Tests
        run: |
          cd flutter-assignment
          flutter test test/unit_test.dart test/widget_flow_test.dart

      # Golden layout tests are excluded from CI because golden PNG files are
      # rendered on macOS and pixel output differs on Linux runners.
      # Run locally with: flutter test test/golden_layout_test.dart
